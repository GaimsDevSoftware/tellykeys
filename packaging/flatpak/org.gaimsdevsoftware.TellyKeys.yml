app-id: org.gaimsdevsoftware.TellyKeys
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: tellykeys

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-config/tellykeys:create
  - --talk-name=org.freedesktop.Avahi

modules:
  - name: python-dependencies
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app androidtvremote2==0.3.1

  - name: tellykeys
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
      - install -Dm644 packaging/flatpak/org.gaimsdevsoftware.TellyKeys.desktop /app/share/applications/org.gaimsdevsoftware.TellyKeys.desktop
      - install -Dm644 assets/tellykeys.svg /app/share/icons/hicolor/scalable/apps/org.gaimsdevsoftware.TellyKeys.svg
    sources:
      - type: dir
        path: ../..
